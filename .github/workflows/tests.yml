name: PowerAutomation Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run unit tests
        run: |
          pytest tests/unit/ --cov=agents --cov=mcptool --cov=development_tools
      - name: Upload unit test results
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results
          path: |
            .coverage
            htmlcov/

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run integration tests
        run: |
          pytest tests/integration/ --cov=agents --cov=mcptool --cov=development_tools
      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: |
            .coverage
            htmlcov/

  visual-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright
          playwright install
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Start frontend and backend
        run: |
          # 启动后端
          cd backend
          python app.py &
          # 等待后端启动
          sleep 5
          # 启动前端
          cd ../frontend
          npm install
          npm run build
          npm run preview &
          # 等待前端启动
          sleep 5
      - name: Run visual tests
        run: |
          cd test/visual_test
          python run_tests.py --headless
      - name: Upload visual test results
        uses: actions/upload-artifact@v3
        with:
          name: visual-test-results
          path: test/visual_test/reports/

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, visual-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Deploy
        run: |
          echo "部署到生产环境"
          # 这里添加实际的部署命令
