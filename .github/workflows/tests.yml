name: PowerAutomation MCP Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Install Playwright browsers
      run: |
        python -m playwright install chromium
    
    - name: Run tests
      run: |
        pytest tests/e2e/ --html=report.html
    
    - name: Upload test report
      uses: actions/upload-artifact@v2
      with:
        name: test-report
        path: report.html
    
    - name: Run code coverage
      run: |
        pytest --cov=agents/ppt_agent/core/mcp tests/e2e/ --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v1
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Lint with flake8
      run: |
        flake8 agents/ppt_agent/core/mcp/ --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Check formatting with black
      run: |
        black --check agents/ppt_agent/core/mcp/
    
    - name: Check imports with isort
      run: |
        isort --check-only --profile black agents/ppt_agent/core/mcp/
    
    - name: Type check with mypy
      run: |
        mypy agents/ppt_agent/core/mcp/
