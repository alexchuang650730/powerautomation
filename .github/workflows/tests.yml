name: PowerAutomation MCP Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install
        
    - name: Run tests
      run: |
        pytest tests/e2e/ --html=report.html
        
    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: report.html
        
    - name: Upload screenshots
      uses: actions/upload-artifact@v3
      with:
        name: screenshots
        path: tests/output/*.png
        if-no-files-found: ignore
        
    - name: Upload HTML visualizations
      uses: actions/upload-artifact@v3
      with:
        name: visualizations
        path: tests/output/*.html
        if-no-files-found: ignore
