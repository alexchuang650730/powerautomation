name: WebAgentB Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'mcptool/enhancers/webagent_adapter.py'
      - 'tests/unit/test_webagent_adapter.py'
      - 'tests/integration/test_webagent_integration.py'
      - 'test/visual_test/scenarios/test_webagent_visual.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'mcptool/enhancers/webagent_adapter.py'
      - 'tests/unit/test_webagent_adapter.py'
      - 'tests/integration/test_webagent_integration.py'
      - 'test/visual_test/scenarios/test_webagent_visual.py'
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run unit tests
        run: |
          pytest tests/unit/test_webagent_adapter.py -v --cov=mcptool/enhancers
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results
          path: |
            .coverage
            coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run integration tests
        run: |
          pytest tests/integration/test_webagent_integration.py -v
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: |
            .coverage
            coverage.xml

  visual-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest selenium webdriver-manager pillow opencv-python
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
      - name: Run visual tests
        run: |
          python test/visual_test/run_tests.py --test-file test/visual_test/scenarios/test_webagent_visual.py
      - name: Upload screenshots
        uses: actions/upload-artifact@v3
        with:
          name: visual-test-screenshots
          path: test_results/screenshots
